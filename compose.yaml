# Komodo stack: frigate-gif-sidecar
#
# Listens on MQTT (frigate/events), pulls the clip.mp4 for matching doorbell-person
# events, transcodes to a low-fps palette-optimized GIF, writes it where HA can
# serve it at /local/frigate_gifs/<id>.gif, and publishes frigate-gifs/ready/<id>.
#
# REQUIRED before first deploy:
#   1. Set HA_WWW_PATH (see .env.example). On home-debian, find it with:
#         docker inspect homeassistant \
#           --format '{{ range .Mounts }}{{ if eq .Destination "/config" }}{{ .Source }}{{ end }}{{ end }}'
#      The www path is "$HA_CONFIG/www".
#   2. Set MQTT credentials in the .env (Frigate's MQTT user works).
#
services:
  frigate-gif-sidecar:
    container_name: frigate-gif-sidecar
    build:
      context: .
      dockerfile: Dockerfile
    image: frigate-gif-sidecar:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${HA_WWW_PATH:?set HA_WWW_PATH in .env}/frigate_gifs:/output
    healthcheck:
      # If the python process dies, restart picks it back up. This is a
      # connectivity smoke-test against the MQTT broker.
      test: ["CMD-SHELL", "python -c \"import socket,os; s=socket.create_connection((os.environ['MQTT_HOST'], int(os.environ.get('MQTT_PORT','1883'))), timeout=3); s.close()\""]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
