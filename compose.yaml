# Komodo stack: frigate-gif-sidecar
#
# Listens on MQTT (frigate/events), pulls the clip.mp4 for matching doorbell-person
# events, transcodes to a low-fps palette-optimized GIF, writes it where HA can
# serve it at /local/frigate_gifs/<id>.gif, and publishes frigate-gifs/ready/<id>.
#
# HA runs in HA-OS on 192.168.10.103, NOT as a docker container — so we can't
# bind-mount HA's /config/www. Instead we use Docker's built-in cifs volume
# driver to mount the HA Samba addon's `config` share, and write into
# /config/www/frigate_gifs/ over SMB. HA serves it at /local/frigate_gifs/.
services:
  frigate-gif-sidecar:
    container_name: frigate-gif-sidecar
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    # `always`, not `unless-stopped`: if the host/daemon goes down while this
    # container is in a stopped state (e.g. it crashed first), `unless-stopped`
    # would NOT bring it back on daemon restart. `always` does. This bit us on
    # 2026-06-24 when home-debian got caught in the UnRAID power incident — the
    # sidecar exited and sat dead for ~6 days (RestartCount stayed 0).
    restart: always
    env_file:
      - .env
    environment:
      # main.py writes to $OUTPUT_DIR; we mount the HA `config` share at /ha_config
      # and target the www/frigate_gifs subdir. main.py mkdirs it if needed.
      OUTPUT_DIR: /ha_config/www/frigate_gifs
    volumes:
      - ha_config:/ha_config
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,os; s=socket.create_connection((os.environ['MQTT_HOST'], int(os.environ.get('MQTT_PORT','1883'))), timeout=3); s.close()\""]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ha_config:
    driver: local
    driver_opts:
      type: cifs
      # vers=3.0 = SMB3 (HA Samba addon supports it). soft = don't hang the container
      # on broker hiccups. nofail wouldn't apply here since this is a docker driver,
      # but `soft` + healthcheck restart gives us self-healing.
      # uid/gid 1000 is what HA-OS's Samba addon maps writes to — files end up
      # owned by the addon's internal user, readable by HA.
      o: "username=${SMB_USER:?set SMB_USER in .env},password=${SMB_PASS:?set SMB_PASS in .env},rw,vers=3.0,uid=1000,gid=1000,file_mode=0644,dir_mode=0755,soft"
      device: "//${HA_HOST:?set HA_HOST in .env}/config"
